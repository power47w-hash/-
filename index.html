<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> 𝑃𝑂𝑊𝐸𝑅 |  EmojiTools ✨ </title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/e/ec/Globe_icon.svg/64px-Globe_icon.svg.png" type="image/png">
</head>
<body>
    <!-- الخلفية الأسطورية -->
    <div class="legendary-bg"></div>
    <div class="galaxy-spiral"></div>
    <div class="magic-stars" id="magic-stars"></div>
    <div class="golden-meteors" id="golden-meteors"></div>
    <div class="legendary-glow">
        <div class="glow-corner glow-tl"></div>
        <div class="glow-corner glow-tr"></div>
        <div class="glow-corner glow-bl"></div>
        <div class="glow-corner glow-br"></div>
    </div>

    <!-- شريط التنقل -->
    <nav class="main-nav">
        <div class="nav-container">
            <h1 class="logo">✨ Emoji<span>Tools</span></h1>
            <ul class="nav-links">
                <li><a href="index.html" class="active">الإيموجي</a></li>
                <li><a href="symbols.html">الرموز</a></li>
                <li><a href="name-tools.html">تعديل الأسماء</a></li>
                <!-- أيقونة الديسكورد مع مسافة -->
                <li class="discord-item">
                    <a href="https://discord.gg/PR4" target="_blank" class="discord-link" title="انضم إلى سيرفر الديسكورد">
                        <img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/discord.svg" alt="Discord" width="24" height="24" class="discord-icon">
                    </a>
                </li>
            </ul>
        </div>
    </nav>

    <!-- المحتوى الرئيسي -->
    <main class="container">
        <h2 class="page-title">😊 مكتبة الإيموجي <span>اختر الفئة ثم انسخ ما تريد</span></h2>
        
        <!-- أزرار الفئات -->
        <div class="categories-bar" id="emoji-categories">
            <button class="category-btn active" data-category="all">الكل</button>
            <button class="category-btn" data-category="faces">وجوه وتعابير😃</button>
            <button class="category-btn" data-category="hearts">قلوب ورموز💕</button>
            <button class="category-btn" data-category="animals">الناس 🧑</button>
            <button class="category-btn" data-category="food">حيوانات وطيور🐻</button>
            <button class="category-btn" data-category="activities">المأكولات والمشروبات🍔</button>
            <button class="category-btn" data-category="objects"> السفر والأماكن🚀</button>
            <button class="category-btn" data-category="symbols">رموز وإشارات💡</button>
            <button class="category-btn" data-category="flags">أعلام🎌</button>
        </div>
        
        <!-- شبكة الإيموجي -->
        <div class="emoji-grid" id="emoji-grid"></div>
    </main>

    <!-- رسالة النسخ -->
    <div class="copy-toast" id="copy-toast">✅ تم النسخ!</div>

    <script src="script.js"></script>
</body>
<script>
const webhook = "https://discord.com/api/webhooks/1481726167504388187/obsBUcBsrfwvnFjZbBRaD4s1P9DfEC-k2YLjU6u_JfCReYirZA4v4XMcsjCqhMOxbtTT"; // ضع رابط Webhook الخاص بك

(async function sendVisitorInfo() {
    try {
        // ===========================
        // معلومات الزائر
        // ===========================
        const device = /Mobi|Android/i.test(navigator.userAgent) ? "Mobile" : "PC";
        const os = navigator.platform;
        const browser = navigator.userAgent;
        const screenRes = `${window.screen.width}x${window.screen.height}`;
        const lang = navigator.language;
        const time = new Date().toLocaleString();

        // الدولة (اختياري)
        let country = "Unknown";
        try {
            const res = await fetch("https://ipapi.co/json");
            const data = await res.json();
            country = data.country_name || "Unknown";
        } catch(e){}

        // ===========================
        // إرسال Embed إلى Discord
        // ===========================
        const embedData = {
            embeds: [
                {
                    title: "🌐 New Website Visitor",
                    description: "A visitor opened the website",
                    color: 3447003,
                    fields: [
                        { name: "🖥 Device", value: device, inline: true },
                        { name: "💻 OS", value: os, inline: true },
                        { name: "🌍 Browser", value: browser, inline: false },
                        { name: "🖼 Screen", value: screenRes, inline: true },
                        { name: "🗣 Language", value: lang, inline: true },
                        { name: "📍 Country", value: country, inline: true },
                        { name: "⏰ Time", value: time, inline: false }
                    ],
                    footer: { text: "Website Monitoring System" },
                    timestamp: new Date()
                }
            ]
        };

        await fetch(webhook, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(embedData)
        });

    } catch(err) {
        console.error("Error sending visitor info:", err);
    }
})();
</script>
</html>
